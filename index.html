<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ドライバーマッチング｜GitHub Pages版</title>
<style>
:root{--bg:#12161d;--panel:#1a2029;--panel2:#212936;--line:#2b3441;--text:#e9edf3;--dim:#8d9bb0;--accent:#ff9f43;--good:#3ddc97;--warn:#ffd166;--bad:#ff6b6b}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;font-size:14px}header{padding:18px 24px;border-bottom:1px solid var(--line)}h1{font-size:18px;margin:0}.sub{color:var(--dim);font-size:12px;margin-top:6px}main{max-width:1100px;margin:0 auto;padding:22px 24px 60px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:16px}label{display:block;color:#9fb0c9;font-size:12px;font-weight:700;margin-bottom:6px}textarea,input,select{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:10px;font-family:inherit}textarea{min-height:260px;resize:vertical;line-height:1.7}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px 16px}.field{margin-bottom:4px}.btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:10px 18px;border-radius:8px;cursor:pointer;font-weight:800}.btn.primary{background:var(--accent);border-color:var(--accent);color:#1a1206}.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px}.hint{color:var(--dim);font-size:12px;line-height:1.7}.ok{color:var(--good)}.warn{color:var(--warn)}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.tab{padding:9px 14px;border:1px solid var(--line);border-radius:999px;background:var(--panel);color:var(--dim);cursor:pointer;font-weight:700}.tab.active{color:var(--accent);border-color:var(--accent)}table{width:100%;border-collapse:collapse;font-size:12px}th,td{border-bottom:1px solid var(--line);padding:8px;text-align:left;vertical-align:top}th{color:var(--dim);white-space:nowrap}.tag{display:inline-block;border-radius:999px;padding:3px 8px;margin:2px;font-size:11px;background:#263140;border:1px solid var(--line)}.tag.good{color:var(--good)}.tag.warn{color:var(--warn)}.tag.bad{color:var(--bad)}.card{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px}.small{font-size:12px;color:var(--dim)}@media(max-width:760px){.grid{grid-template-columns:1fr}main{padding:16px}}
</style>
</head>
<body>
<header>
  <h1>ドライバー×運送会社 マッチング（GitHub Pages版）</h1>
  <div class="sub">API不要・Claude不要。ドラPRO等の文章を貼るだけで、正規表現で候補者情報を抽出します。</div>
</header>
<main>
  <div class="tabs">
    <button class="tab active" data-tab="candidate">① 候補者を貼り付け</button>
    <button class="tab" data-tab="company">② 運送会社一覧</button>
    <button class="tab" data-tab="match">③ マッチング結果</button>
  </div>

  <section id="candidate" class="tabBody">
    <div class="panel">
      <label>候補者プロフィール文章</label>
      <textarea id="rawCandidate" placeholder="DR-083\n・年齢：43歳\n・居住地（市区町村まで）：奈良県橿原市五条野町\n... をそのまま貼り付け"></textarea>
      <div class="toolbar">
        <button class="btn primary" id="parseBtn">解析する</button>
        <button class="btn" id="clearBtn">クリア</button>
        <span class="hint">※ブラウザ内だけで処理します。API通信はしません。</span>
      </div>
      <div id="parseStatus" class="hint" style="margin-top:8px"></div>
    </div>
    <div class="panel">
      <label>読み取り結果（編集できます）</label>
      <div id="candidateFields" class="grid"></div>
      <div class="toolbar">
        <button class="btn primary" id="saveCandidateBtn">この候補者を保存</button>
        <button class="btn" id="copySummaryBtn">要約をコピー</button>
      </div>
    </div>
    <div class="panel">
      <label>保存済み候補者</label>
      <div id="candidateList" class="hint">まだ保存されていません。</div>
    </div>
  </section>

  <section id="company" class="tabBody" style="display:none">
    <div class="panel">
      <label>運送会社一覧（1行=1社。タブ区切り・カンマ区切り・自由記述OK）</label>
      <textarea id="rawCompany" placeholder="会社名\t住所\t必要免許\t車種\t仕事内容\t休日\t給与\n例）山口運送\t奈良県橿原市...\t普通免許（8t限定）\t2t・4t\t地場配送\t日曜休み\t月給30万円～"></textarea>
      <div class="toolbar">
        <button class="btn primary" id="importCompanyBtn">取り込む</button>
        <span class="hint">今後マッチング機能を広げやすいよう、localStorageに保存します。</span>
      </div>
    </div>
    <div class="panel">
      <label>保存済み運送会社</label>
      <div id="companyList"></div>
    </div>
  </section>

  <section id="match" class="tabBody" style="display:none">
    <div class="panel">
      <label>候補者を選択</label>
      <select id="candidateSelect"></select>
      <div class="toolbar"><button class="btn primary" id="matchBtn">マッチングする</button></div>
    </div>
    <div id="matchResults"></div>
  </section>
</main>
<script>
const LS_CAND='mt_candidates_v2', LS_COMP='mt_companies_v2';
const candidateKeys=[
 ['id','候補者ID'],['age','年齢'],['residence','居住地'],['commuteMethod','通勤手段'],['commuteRaw','希望勤務地・通勤条件'],['commuteMinutes','通勤希望時間(分)'],['desiredArea','希望エリア'],['driverExperience','ドライバー経験'],['licenses','保有免許・資格'],['currentJob','現職/前職仕事内容'],['currentIncome','現在/前職収入'],['desiredSalary','希望給与'],['desiredHoliday','希望休日'],['desiredWorkHours','希望勤務時間'],['desiredJob','希望仕事内容/転職軸'],['cargoOk','手積み・手降ろし'],['longDistance','長距離'],['jobChangeTiming','転職時期'],['interviewAvailability','面接可能日程'],['other','その他'],['summary','要約']
];
let candidates=load(LS_CAND), companies=load(LS_COMP), currentCandidate={};
function load(k){try{return JSON.parse(localStorage.getItem(k)||'[]')}catch(e){return[]}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
function val(v){return (v||'').toString().trim()}
function esc(s){return val(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function lineValue(text,label){
 const re=new RegExp('(?:^|\\n)[\\s・　-]*'+label+'(?:（[^）]*）)?[：:]\\s*([^\\n]+)','m');
 const m=text.match(re); return m?val(m[1]):'';
}
function blockAfter(text,label){
 const re=new RegExp('(?:^|\\n)[\\s・　-]*'+label+'[：:]?\\s*([\\s\\S]*?)(?=\\n[\\s・]*[ぁ-んァ-ン一-龥A-Za-z0-9（）()・／/]+[：:]|$)','m');
 const m=text.match(re); return m?val(m[1].replace(/^[-　\s]+/gm,'').replace(/\n+/g,' / ')):'';
}
function firstMatch(text,regs){for(const r of regs){const m=text.match(r); if(m)return val(m[1]||m[0])} return ''}
function parseMinutes(text){
 const m=text.match(/(\d+)\s*[～〜~－-]\s*(\d+)\s*分/); if(m)return m[2];
 const m2=text.match(/(\d+)\s*分圏内/); if(m2)return m2[1];
 return '';
}
function parseCandidate(text){
 const axis=blockAfter(text,'転職の軸') || lineValue(text,'転職の軸');
 const other=blockAfter(text,'その他');
 const rawComm=lineValue(text,'希望勤務地') || firstMatch(text,[/自宅から[^\n。]+/]);
 const desiredSalary=firstMatch(text,[/年収\s*([0-9]+\s*万円程度?)/,/額面月収\s*([0-9]+\s*万円)/,/月収\s*([0-9]+\s*万円)/]);
 const holiday=firstMatch(axis+'\n'+text,[/(週休\s*2日[^\n／。]*)/,/(日曜休み[^\n／。]*)/,/(休日重視)/]);
 const hours=firstMatch(axis+'\n'+text,[/(朝早い勤務希望[^\n。]*)/,/(\d{1,2}:\d{2}\s*[～〜-]\s*\d{1,2}:\d{2})/,/(\d{1,2}:\d{2}頃からの勤務も可能)/]);
 const longDistance= text.match(/長距離は避けたい|長距離.*不可|日帰り配送希望/) ? '長距離は避けたい（中距離・日帰り希望）' : '';
 const sales = text.match(/営業業務のない|営業.*ない|営業.*不可/) ? '営業なし希望' : (text.match(/法人営業|営業.*経験/) ? '営業経験あり' : '');
 const desiredJobParts=[sales,longDistance,text.match(/内勤|物流管理/) ? '将来的に内勤・物流管理にも興味あり' : '', axis].filter(Boolean);
 return {
  id:firstMatch(text,[/(DR-[0-9]+)/i]) || 'DR-'+Date.now().toString().slice(-5),
  age:lineValue(text,'年齢'),
  residence:lineValue(text,'居住地') || firstMatch(text,[/(大阪府|奈良県|京都府|兵庫県|滋賀県|和歌山県|愛知県|東京都|神奈川県|埼玉県|千葉県)[^\n、。]+/]),
  commuteMethod:lineValue(text,'通勤手段') || (text.includes('車')?'車':''),
  commuteRaw:rawComm,
  commuteMinutes:parseMinutes(rawComm||text),
  desiredArea:firstMatch(rawComm,[/（([^）]*奈良県[^）]*)）/,/(奈良県か大阪市)/]) || rawComm,
  driverExperience:lineValue(text,'ドライバー経験') || firstMatch(text,[/([軽0-9t・]+ドライバー)/,/([0-9.]+tルート配送)/]),
  licenses:lineValue(text,'保有免許・資格') || lineValue(text,'保有免許'),
  currentJob:lineValue(text,'現職（前職）の仕事内容') || lineValue(text,'前職'),
  currentIncome:lineValue(text,'現在（前職）の収入'),
  desiredSalary:desiredSalary,
  desiredHoliday:holiday,
  desiredWorkHours:hours,
  desiredJob:desiredJobParts.join(' / '),
  cargoOk:firstMatch(text,[/手積み・手降ろし[：:]\s*([^\n]+)/,/手積み.*対応可能/]) || '',
  longDistance:longDistance,
  jobChangeTiming:lineValue(text,'希望の転職時期'),
  interviewAvailability:lineValue(text,'面接可能日程'),
  other:other,
  summary:''
 };
}
function makeSummary(c){
 const parts=[];
 if(c.id)parts.push(c.id);
 if(c.residence)parts.push(c.residence);
 if(c.licenses)parts.push(c.licenses);
 if(c.driverExperience)parts.push(c.driverExperience);
 if(c.commuteMinutes)parts.push('車'+c.commuteMinutes+'分圏内');
 if(c.cargoOk)parts.push('手積み可');
 if(c.desiredSalary)parts.push('希望'+c.desiredSalary);
 return parts.join('／');
}
function renderFields(c){
 currentCandidate=c; const wrap=document.getElementById('candidateFields'); wrap.innerHTML='';
 candidateKeys.forEach(([k,label])=>{const d=document.createElement('div');d.className='field';d.innerHTML=`<label>${label}</label><input data-k="${k}" value="${esc(c[k]||'')}">`;wrap.appendChild(d)});
}
function collectFields(){const o={};document.querySelectorAll('#candidateFields input').forEach(i=>o[i.dataset.k]=i.value.trim());if(!o.summary)o.summary=makeSummary(o);return o}
function renderCandidateList(){
 const box=document.getElementById('candidateList'); const sel=document.getElementById('candidateSelect');
 if(sel){sel.innerHTML=candidates.map((c,i)=>`<option value="${i}">${esc(c.summary||c.id||('候補者'+(i+1)))}</option>`).join('')}
 if(!candidates.length){box.innerHTML='まだ保存されていません。';return}
 box.innerHTML=candidates.map((c,i)=>`<div class="card"><b>${esc(c.summary||c.id)}</b><div class="small">${esc(c.residence)} / ${esc(c.licenses)} / ${esc(c.driverExperience)}</div><button class="btn" onclick="deleteCandidate(${i})">削除</button></div>`).join('')
}
window.deleteCandidate=i=>{candidates.splice(i,1);save(LS_CAND,candidates);renderCandidateList()}
function parseCompanies(raw){
 const lines=raw.split(/\n/).map(x=>x.trim()).filter(Boolean); const out=[];
 lines.forEach(line=>{
  if(/会社名|住所|必要免許/.test(line)&&/\t|,/.test(line))return;
  const cols=line.split(/\t|,/).map(val);
  let c={companyName:'',address:'',license:'',vehicles:'',job:'',holiday:'',salary:''};
  if(cols.length>=3){[c.companyName,c.address,c.license,c.vehicles,c.job,c.holiday,c.salary]=cols}
  else{c.companyName=cols[0]||'';c.address=firstMatch(line,[/((?:大阪府|奈良県|京都府|兵庫県|滋賀県|和歌山県|愛知県|東京都)[^\s,、]+)/]);c.license=firstMatch(line,[/(普通免許[^\s,、]*)/,/(準中型[^\s,、]*)/,/(中型免許[^\s,、]*)/,/(大型免許[^\s,、]*)/]);c.vehicles=firstMatch(line,[/([軽0-9t・]+車?)/]);c.job=firstMatch(line,[/(地場配送|ルート配送|中距離|長距離|センター配送)/]);}
  if(c.companyName||c.address)out.push(c)
 });
 return out;
}
function renderCompanyList(){
 const box=document.getElementById('companyList');
 if(!companies.length){box.innerHTML='<div class="hint">まだ保存されていません。</div>';return}
 box.innerHTML=`<table><thead><tr><th>会社名</th><th>住所</th><th>免許</th><th>車種</th><th>仕事内容</th><th>休日</th><th>給与</th><th></th></tr></thead><tbody>`+companies.map((c,i)=>`<tr><td>${esc(c.companyName)}</td><td>${esc(c.address)}</td><td>${esc(c.license)}</td><td>${esc(c.vehicles)}</td><td>${esc(c.job)}</td><td>${esc(c.holiday)}</td><td>${esc(c.salary)}</td><td><button class="btn" onclick="deleteCompany(${i})">削除</button></td></tr>`).join('')+'</tbody></table>'
}
window.deleteCompany=i=>{companies.splice(i,1);save(LS_COMP,companies);renderCompanyList()}
function score(cand,comp){
 let s=0, good=[], warn=[];
 if(cand.residence&&comp.address){const cp=prefCity(cand.residence), bp=prefCity(comp.address); if(cp.pref&&bp.pref&&cp.pref===bp.pref){s+=30;good.push('同一府県')} if(cp.city&&bp.city&&cp.city===bp.city){s+=25;good.push('同一市区町村')}}
 if(cand.licenses&&comp.license){ if(licenseOk(cand.licenses,comp.license)){s+=25;good.push('免許条件OK')} else warn.push('免許要確認') }
 if(cand.driverExperience&&comp.vehicles){ if(overlapWords(cand.driverExperience,comp.vehicles)){s+=15;good.push('経験車種が近い')} }
 if(cand.desiredHoliday&&comp.holiday&&overlapWords(cand.desiredHoliday,comp.holiday)){s+=10;good.push('休日条件が近い')}
 if(cand.desiredSalary&&comp.salary){s+=5;good.push('給与条件は要確認')}
 if(cand.longDistance&&/長距離/.test(comp.job))warn.push('長距離は避けたい希望あり');
 return {pct:Math.min(100,s),good,warn};
}
function prefCity(a){const m=a.match(/(北海道|東京都|大阪府|京都府|.{2,3}県)([^市区町村\s　]+[市区町村])?/);return {pref:m?m[1]:'',city:m&&m[2]?m[2]:''}}
function licenseOk(have,req){ if(!req)return true; if(have.includes('8t限定')&&/(普通|準中型|2t|4t|8t)/.test(req))return true; if(have.includes('5t限定')&&/(普通|準中型|2t|5t|1.5t)/.test(req))return true; return overlapWords(have,req)}
function overlapWords(a,b){const wa=a.split(/[、・\/\s（）()]+/).filter(x=>x.length>1), wb=b.split(/[、・\/\s（）()]+/).filter(x=>x.length>1);return wa.some(x=>wb.some(y=>x.includes(y)||y.includes(x)))}
function runMatch(){
 const i=document.getElementById('candidateSelect').value; const cand=candidates[i]; const box=document.getElementById('matchResults');
 if(!cand||!companies.length){box.innerHTML='<div class="panel hint">候補者または運送会社を登録してください。</div>';return}
 const rows=companies.map(comp=>({comp,...score(cand,comp)})).sort((a,b)=>b.pct-a.pct);
 box.innerHTML=rows.map(r=>`<div class="card"><b>${esc(r.comp.companyName||'会社名なし')}</b><span class="tag good">${r.pct}%</span><div class="small">${esc(r.comp.address)}</div><div>${r.good.map(x=>`<span class="tag good">✓ ${esc(x)}</span>`).join('')}${r.warn.map(x=>`<span class="tag warn">△ ${esc(x)}</span>`).join('')}</div></div>`).join('')
}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.tabBody').forEach(x=>x.style.display='none');document.getElementById(b.dataset.tab).style.display='block';renderCandidateList();renderCompanyList()});
document.getElementById('parseBtn').onclick=()=>{const raw=document.getElementById('rawCandidate').value;const c=parseCandidate(raw);c.summary=makeSummary(c);renderFields(c);document.getElementById('parseStatus').innerHTML='<span class="ok">解析しました。必要に応じて修正して保存してください。</span>'};
document.getElementById('clearBtn').onclick=()=>{document.getElementById('rawCandidate').value='';renderFields({})};
document.getElementById('saveCandidateBtn').onclick=()=>{const c=collectFields();candidates.push(c);save(LS_CAND,candidates);renderCandidateList();alert('保存しました')};
document.getElementById('copySummaryBtn').onclick=async()=>{const c=collectFields();const txt=candidateKeys.map(([k,l])=>c[k]?`${l}：${c[k]}`:'').filter(Boolean).join('\n');await navigator.clipboard.writeText(txt);alert('コピーしました')};
document.getElementById('importCompanyBtn').onclick=()=>{companies=companies.concat(parseCompanies(document.getElementById('rawCompany').value));save(LS_COMP,companies);renderCompanyList();alert('取り込みました')};
document.getElementById('matchBtn').onclick=runMatch;
renderFields({});renderCandidateList();renderCompanyList();
</script>
</body>
</html>
